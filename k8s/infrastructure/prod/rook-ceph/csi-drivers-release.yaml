apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
  namespace: rook-ceph
spec:
  interval: 5m
  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.1
      sourceRef:
        kind: HelmRepository
        name: rook-csi
        namespace: flux-system
      interval: 1m
  upgrade:
    force: true # Matches the '--force' flag
    remediation:
      retries: 3
  # values:
