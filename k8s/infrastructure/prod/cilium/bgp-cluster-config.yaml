apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
  namespace: kube-system
spec:
  nodeSelector:
    matchExpressions:
      - key: node.kubernetes.io/exclude-from-external-load-balancers=
        operator: NotIn
        values: [""] # empty string matches label existence with empty value
  bgpInstances:
    - name: "main-instance"
      localASN: 65000
      peers:
        - name: "pfsense-router"
          peerASN: 64512
          autoDiscovery:
            mode: "DefaultGateway"
            defaultGateway:
              addressFamily: ipv4
          peerConfigRef:
            name: "cilium-peer"
        # - name: "pfsense-router-ipv6"
        #   peerASN: 64512
        #   peerAddress: 2600:1700:6e0f:f81c:ec4:7aff:fe99:39bf
        #   peerConfigRef:
        #     name: "cilium-peer"
