apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hubble-dashboard
  namespace: kube-system
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    # route any traffic to the dashboard that is not on the 10.43.0.0/16 network
    - match: Host(`hubble.prod.opryga.com`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: local-ip-list
          namespace: traefik
        - name: default-headers
          namespace: traefik
      services:
        - name: hubble-ui
          port: 80
  tls:
    secretName: prod-opryga-com-tls # give it the ole tls cert
  #   passthrough: true # use the tls from the service
